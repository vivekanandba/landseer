<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Landseer</title>
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%F0%9F%8F%9E%EF%B8%8F%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">🏞️</span>
          <div>
            <div class="brand-name">Landseer</div>
            <div class="brand-sub">Vellore land search</div>
          </div>
        </div>
        <nav class="nav" id="nav">
          <a href="#/" data-route="/"><span class="nav-ico">▤</span> Dashboard</a>
          <a href="#/properties" data-route="/properties"><span class="nav-ico">◧</span> Properties</a>
          <a href="#/recommendations" data-route="/recommendations"><span class="nav-ico">★</span> Recommendations</a>
          <a href="#/compare" data-route="/compare"><span class="nav-ico">⇄</span> Compare</a>
          <a href="#/brokers" data-route="/brokers"><span class="nav-ico">☎</span> Brokers</a>
        </nav>
        <div class="sidebar-foot">
          <button id="theme-toggle" class="ghost-btn" title="Toggle theme">◐ Theme</button>
          <button id="signout-btn" class="ghost-btn" title="Sign out">⎋ Sign out</button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div id="crumb" class="crumb">Dashboard</div>
          <div class="topbar-right">
            <span id="conn" class="conn"></span>
            <button id="settings-btn" class="ghost-btn">⚙ Settings</button>
          </div>
        </header>
        <section id="view" class="view" aria-live="polite"></section>
      </main>
    </div>

    <div id="modal-root"></div>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
